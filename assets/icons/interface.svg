<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- USB 接口主体 -->
  <rect x="10" y="18" width="28" height="16" rx="3"/>
  <!-- USB 插头凸起 -->
  <rect x="20" y="10" width="8" height="8" rx="1"/>
  <!-- USB 内部接脚 -->
  <line x1="16" y1="24" x2="16" y2="30"/>
  <line x1="24" y1="24" x2="24" y2="30"/>
  <line x1="32" y1="24" x2="32" y2="30"/>
  <!-- USB 信号标志（三叉） -->
  <circle cx="24" cy="8" r="2" fill="currentColor" stroke="none"/>
</svg>
