<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Token：小方块分词 -->
  <rect x="4" y="18" width="10" height="12" rx="2"/>
  <rect x="16" y="18" width="16" height="12" rx="2"/>
  <rect x="34" y="18" width="10" height="12" rx="2"/>
  <!-- 分割竖线 -->
  <line x1="14" y1="14" x2="14" y2="34" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="14" x2="32" y2="34" stroke-width="1" opacity="0.3"/>
  <!-- 上方标签 -->
  <line x1="4" y1="12" x2="44" y2="12" stroke-width="1" opacity="0.25"/>
</svg>
