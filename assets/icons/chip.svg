<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- 芯片 -->
  <rect x="14" y="14" width="20" height="20" rx="3"/>
  <!-- 引脚 左 -->
  <line x1="6" y1="19" x2="14" y2="19"/>
  <line x1="6" y1="24" x2="14" y2="24"/>
  <line x1="6" y1="29" x2="14" y2="29"/>
  <!-- 引脚 右 -->
  <line x1="34" y1="19" x2="42" y2="19"/>
  <line x1="34" y1="24" x2="42" y2="24"/>
  <line x1="34" y1="29" x2="42" y2="29"/>
  <!-- 引脚 上 -->
  <line x1="19" y1="6" x2="19" y2="14"/>
  <line x1="24" y1="6" x2="24" y2="14"/>
  <line x1="29" y1="6" x2="29" y2="14"/>
  <!-- 引脚 下 -->
  <line x1="19" y1="34" x2="19" y2="42"/>
  <line x1="24" y1="34" x2="24" y2="42"/>
  <line x1="29" y1="34" x2="29" y2="42"/>
  <!-- 芯片内部标记 -->
  <circle cx="24" cy="24" r="3" fill="currentColor" stroke="none" opacity="0.3"/>
</svg>
