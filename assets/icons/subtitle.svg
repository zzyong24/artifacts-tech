<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- 字幕图标：视频条 + 字幕区 -->
  <rect x="4" y="6" width="40" height="30" rx="3"/>
  <!-- 字幕区背景 -->
  <rect x="4" y="27" width="40" height="9" rx="0" fill="currentColor" opacity="0.08" stroke="none"/>
  <line x1="10" y1="31" x2="30" y2="31"/>
  <line x1="10" y1="35" x2="24" y2="35"/>
  <!-- 播放按钮 -->
  <polygon points="18,12 18,22 28,17" opacity="0.5" fill="currentColor" stroke="none"/>
  <!-- 底部时间轴 -->
  <rect x="4" y="38" width="40" height="4" rx="2" fill="none"/>
  <rect x="4" y="38" width="18" height="4" rx="2" fill="currentColor" opacity="0.3" stroke="none"/>
</svg>
