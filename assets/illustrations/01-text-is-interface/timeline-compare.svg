<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" fill="none">

  <!-- ── 左侧：视频收藏 · 衰减时间线 ── -->
  <text x="160" y="28" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c43a2a" letter-spacing="2">收藏的视频</text>

  <!-- 时间轴 -->
  <line x1="60" y1="50" x2="260" y2="50" stroke="#c43a2a" stroke-width="1.5" opacity="0.4"/>

  <!-- 时间节点 -->
  <!-- T=0 -->
  <circle cx="80" cy="50" r="6" fill="#c43a2a"/>
  <text x="80" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670">收藏</text>
  <!-- 卡片：满格 -->
  <rect x="50" y="90" width="60" height="80" rx="6" fill="#fff0ee" stroke="#c43a2a" stroke-width="1.2"/>
  <rect x="58" y="100" width="44" height="8" rx="2" fill="#c43a2a" opacity="0.6"/>
  <rect x="58" y="112" width="44" height="8" rx="2" fill="#c43a2a" opacity="0.6"/>
  <rect x="58" y="124" width="44" height="8" rx="2" fill="#c43a2a" opacity="0.6"/>
  <rect x="58" y="136" width="30" height="8" rx="2" fill="#c43a2a" opacity="0.6"/>
  <text x="80" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#c43a2a" opacity="0.8">观看时</text>

  <!-- T=1月 -->
  <circle cx="150" cy="50" r="5" fill="#c43a2a" opacity="0.5"/>
  <line x1="150" y1="56" x2="150" y2="88" stroke="#c43a2a" stroke-width="1" opacity="0.3" stroke-dasharray="3 2"/>
  <text x="150" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670">1 个月后</text>
  <!-- 卡片：半衰 -->
  <rect x="120" y="90" width="60" height="80" rx="6" fill="#fff0ee" stroke="#c43a2a" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
  <rect x="128" y="100" width="44" height="8" rx="2" fill="#c43a2a" opacity="0.3"/>
  <rect x="128" y="112" width="30" height="8" rx="2" fill="#c43a2a" opacity="0.2"/>
  <rect x="128" y="124" width="10" height="8" rx="2" fill="#c43a2a" opacity="0.1"/>
  <text x="150" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#c43a2a" opacity="0.6">大半遗忘</text>

  <!-- T=1年 -->
  <circle cx="230" cy="50" r="4" fill="#c43a2a" opacity="0.2"/>
  <line x1="230" y1="56" x2="230" y2="88" stroke="#c43a2a" stroke-width="1" opacity="0.2" stroke-dasharray="3 2"/>
  <text x="230" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670">1 年后</text>
  <!-- 卡片：空 -->
  <rect x="200" y="90" width="60" height="80" rx="6" fill="#f0ece3" stroke="#d0ccc4" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" fill="#7a7670" opacity="0.3">?</text>
  <text x="230" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670" opacity="0.5">大海捞针</text>

  <!-- 视频下架标注 -->
  <rect x="54" y="210" width="206" height="32" rx="6" fill="#fff0ee" stroke="#c43a2a" stroke-width="0.8" opacity="0.6"/>
  <text x="157" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c43a2a" opacity="0.8">视频下架 → 什么都没了</text>

  <!-- ── 分割线 ── -->
  <line x1="360" y1="20" x2="360" y2="280" stroke="#1c1a16" stroke-width="1" opacity="0.1"/>

  <!-- ── 右侧：整理的文本 · 增值时间线 ── -->
  <text x="560" y="28" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#2a8a5a" letter-spacing="2">整理的文本</text>

  <!-- 时间轴（上升） -->
  <line x1="400" y1="170" x2="700" y2="50" stroke="#2a8a5a" stroke-width="1.5" opacity="0.4"/>

  <!-- T=0 -->
  <circle cx="420" cy="164" r="6" fill="#2a8a5a"/>
  <text x="420" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670">整理时</text>
  <!-- 文本卡片：初始 -->
  <rect x="390" y="200" width="60" height="72" rx="6" fill="#f0faf4" stroke="#2a8a5a" stroke-width="1.2"/>
  <rect x="398" y="210" width="44" height="6" rx="2" fill="#2a8a5a" opacity="0.5"/>
  <rect x="398" y="220" width="44" height="6" rx="2" fill="#2a8a5a" opacity="0.5"/>
  <rect x="398" y="230" width="30" height="6" rx="2" fill="#2a8a5a" opacity="0.5"/>
  <text x="420" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#2a8a5a" opacity="0.8">初稿</text>

  <!-- T=1月 -->
  <circle cx="540" cy="107" r="6" fill="#2a8a5a" opacity="0.8"/>
  <line x1="540" y1="113" x2="540" y2="196" stroke="#2a8a5a" stroke-width="1" opacity="0.3" stroke-dasharray="3 2"/>
  <text x="540" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670">补充迭代</text>
  <!-- 文本卡片：增长 -->
  <rect x="510" y="142" width="60" height="80" rx="6" fill="#f0faf4" stroke="#2a8a5a" stroke-width="1.5"/>
  <rect x="518" y="152" width="44" height="6" rx="2" fill="#2a8a5a" opacity="0.7"/>
  <rect x="518" y="162" width="44" height="6" rx="2" fill="#2a8a5a" opacity="0.7"/>
  <rect x="518" y="172" width="44" height="6" rx="2" fill="#2a8a5a" opacity="0.7"/>
  <rect x="518" y="182" width="44" height="6" rx="2" fill="#2a8a5a" opacity="0.4"/>
  <rect x="518" y="192" width="30" height="6" rx="2" fill="#2a8a5a" opacity="0.4"/>
  <text x="540" y="234" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#2a8a5a" opacity="0.8">+关联内容</text>

  <!-- T=1年 -->
  <circle cx="660" cy="50" r="7" fill="#2a8a5a"/>
  <line x1="660" y1="57" x2="660" y2="86" stroke="#2a8a5a" stroke-width="1" opacity="0.4" stroke-dasharray="3 2"/>
  <text x="660" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a7670">方法论</text>
  <!-- 文本卡片：丰满 -->
  <rect x="625" y="86" width="70" height="100" rx="6" fill="#f0faf4" stroke="#2a8a5a" stroke-width="2"/>
  <rect x="633" y="96" width="54" height="6" rx="2" fill="#2a8a5a"/>
  <rect x="633" y="106" width="54" height="6" rx="2" fill="#2a8a5a"/>
  <rect x="633" y="116" width="54" height="6" rx="2" fill="#2a8a5a"/>
  <rect x="633" y="126" width="54" height="6" rx="2" fill="#2a8a5a" opacity="0.8"/>
  <rect x="633" y="136" width="54" height="6" rx="2" fill="#2a8a5a" opacity="0.8"/>
  <rect x="633" y="146" width="40" height="6" rx="2" fill="#2a8a5a" opacity="0.6"/>
  <rect x="633" y="156" width="30" height="6" rx="2" fill="#2a8a5a" opacity="0.4"/>
  <text x="660" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#2a8a5a" opacity="0.9">个人方法论</text>

  <!-- 可搜索标注 -->
  <rect x="394" y="210" width="266" height="32" rx="6" fill="#f0faf4" stroke="#2a8a5a" stroke-width="0.8" opacity="0.7"/>
  <text x="527" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2a8a5a" opacity="0.9">关键词搜索 → 一秒定位 · 永久有效</text>

</svg>
