<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b5700f"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7a7670"/>
    </marker>
  </defs>

  <!-- 左侧：多媒体格式群 -->
  <!-- 视频图标 -->
  <rect x="30" y="60" width="120" height="80" rx="10" fill="#f0ece3" stroke="#d0ccc4" stroke-width="1.5"/>
  <polygon points="70,85 70,125 110,105" fill="#c43a2a" opacity="0.7"/>
  <text x="90" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#7a7670">视频</text>

  <!-- 音频图标 -->
  <rect x="30" y="188" width="120" height="80" rx="10" fill="#f0ece3" stroke="#d0ccc4" stroke-width="1.5"/>
  <path d="M65 228 Q65 208 80 208 Q95 208 95 228 Q95 248 80 248 Q65 248 65 228" stroke="#7a7670" stroke-width="2" fill="none"/>
  <line x1="80" y1="248" x2="80" y2="260" stroke="#7a7670" stroke-width="2"/>
  <line x1="68" y1="260" x2="92" y2="260" stroke="#7a7670" stroke-width="2"/>
  <path d="M102 218 Q112 228 102 238" stroke="#7a7670" stroke-width="1.5" fill="none"/>
  <path d="M108 212 Q122 228 108 244" stroke="#7a7670" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="90" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#7a7670">音频</text>

  <!-- 图片图标 -->
  <rect x="168" y="124" width="120" height="80" rx="10" fill="#f0ece3" stroke="#d0ccc4" stroke-width="1.5"/>
  <circle cx="200" cy="148" r="10" fill="#2a6ea8" opacity="0.5"/>
  <polygon points="175,190 215,155 245,175 255,190" fill="#2a8a5a" opacity="0.4"/>
  <text x="228" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#7a7670">图片</text>

  <!-- 汇聚箭头 → 中间文本接口 -->
  <line x1="150" y1="100" x2="295" y2="155" stroke="#7a7670" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-dim)"/>
  <line x1="150" y1="228" x2="295" y2="195" stroke="#7a7670" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-dim)"/>
  <line x1="288" y1="164" x2="295" y2="164" stroke="#7a7670" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr-dim)"/>

  <!-- 中心：文本接口卡片 -->
  <rect x="300" y="100" width="200" height="120" rx="12" fill="#fff9f0" stroke="#b5700f" stroke-width="2"/>
  <!-- 文本图标 -->
  <rect x="330" y="118" width="40" height="50" rx="4" fill="none" stroke="#b5700f" stroke-width="1.5"/>
  <polyline points="348,118 348,130 370,130" stroke="#b5700f" stroke-width="1.5" fill="none"/>
  <line x1="336" y1="138" x2="362" y2="138" stroke="#b5700f" stroke-width="1.2"/>
  <line x1="336" y1="146" x2="362" y2="146" stroke="#b5700f" stroke-width="1.2"/>
  <line x1="336" y1="154" x2="352" y2="154" stroke="#b5700f" stroke-width="1.2"/>
  <!-- 标签 -->
  <text x="400" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#b5700f">文本</text>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b5700f" opacity="0.8">通用接口</text>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7a7670">LLM 的母语</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7a7670">可拆解 · 可重组</text>

  <!-- 右侧输出箭头 → AI / 未来 -->
  <line x1="500" y1="140" x2="590" y2="100" stroke="#b5700f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="160" x2="590" y2="220" stroke="#b5700f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="160" x2="590" y2="160" stroke="#b5700f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 右上：AI -->
  <rect x="595" y="60" width="140" height="70" rx="10" fill="#f0ece3" stroke="#2a6ea8" stroke-width="1.5"/>
  <text x="665" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#2a6ea8">AI 理解</text>
  <text x="665" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7a7670">全精度 · 无损耗</text>

  <!-- 右中：当下的你 -->
  <rect x="595" y="145" width="140" height="70" rx="10" fill="#f0ece3" stroke="#d0ccc4" stroke-width="1.5"/>
  <text x="665" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1c1a16">现在的你</text>
  <text x="665" y="197" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7a7670">主动对话 · 深度理解</text>

  <!-- 右下：未来的你 -->
  <rect x="595" y="230" width="140" height="70" rx="10" fill="#f0ece3" stroke="#2a8a5a" stroke-width="1.5"/>
  <text x="665" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#2a8a5a">未来的你</text>
  <text x="665" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7a7670">可迭代 · 认知升级</text>

  <!-- 底部说明 -->
  <text x="400" y="308" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#7a7670" opacity="0.7">// 文本：连接多种输入与多种输出的通用接口</text>
</svg>
