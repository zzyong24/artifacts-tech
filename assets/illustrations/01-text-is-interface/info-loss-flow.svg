<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" fill="none">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c43a2a"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b5700f"/>
    </marker>
  </defs>

  <!-- ── 路径标签 ── -->
  <text x="28" y="68" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c43a2a" opacity="0.9">// 视频路径</text>
  <text x="28" y="188" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#b5700f" opacity="0.9">// 文本路径</text>

  <!-- ════ 路径1：视频路径（红色虚线） ════ -->
  <!-- 节点1：视频 1h -->
  <rect x="28" y="78" width="120" height="56" rx="8" fill="#fff0ee" stroke="#c43a2a" stroke-width="1.5"/>
  <text x="88" y="103" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#c43a2a">视频 1h</text>
  <text x="88" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c43a2a" opacity="0.7">线性 · 被动</text>

  <!-- 箭头 + 损耗标注 -->
  <line x1="148" y1="106" x2="218" y2="106" stroke="#c43a2a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <rect x="155" y="80" width="58" height="20" rx="4" fill="#fff0ee"/>
  <text x="184" y="94" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#c43a2a">先转文本</text>

  <!-- 节点2：转译文本（损耗） -->
  <rect x="218" y="78" width="140" height="56" rx="8" fill="#fff0ee" stroke="#c43a2a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- 损耗可视化：信息方块缺失 -->
  <rect x="230" y="92" width="10" height="10" rx="2" fill="#c43a2a" opacity="0.7"/>
  <rect x="244" y="92" width="10" height="10" rx="2" fill="#c43a2a" opacity="0.5"/>
  <rect x="258" y="92" width="10" height="10" rx="2" fill="#c43a2a" opacity="0.3"/>
  <rect x="272" y="92" width="10" height="10" rx="2" fill="#c43a2a" opacity="0.1"/>
  <rect x="286" y="92" width="10" height="10" rx="2" fill="#e8e3d8" stroke="#d0ccc4" stroke-width="0.5"/>
  <rect x="300" y="92" width="10" height="10" rx="2" fill="#e8e3d8" stroke="#d0ccc4" stroke-width="0.5"/>
  <rect x="314" y="92" width="10" height="10" rx="2" fill="#e8e3d8" stroke="#d0ccc4" stroke-width="0.5"/>
  <rect x="328" y="92" width="10" height="10" rx="2" fill="#e8e3d8" stroke="#d0ccc4" stroke-width="0.5"/>
  <text x="288" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#c43a2a">转译文本（信息损耗）</text>

  <!-- 箭头 + 成本标注 -->
  <line x1="358" y1="106" x2="428" y2="106" stroke="#c43a2a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <rect x="364" y="80" width="58" height="20" rx="4" fill="#fff0ee"/>
  <text x="393" y="94" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#c43a2a">成本 ×50</text>

  <!-- 节点3：AI处理（受损） -->
  <rect x="428" y="78" width="130" height="56" rx="8" fill="#fff0ee" stroke="#c43a2a" stroke-width="1.5"/>
  <text x="493" y="103" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#c43a2a">AI 处理</text>
  <text x="493" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c43a2a" opacity="0.7">理解残缺 · 结果偏差</text>

  <!-- 结果标注 -->
  <rect x="570" y="82" width="160" height="48" rx="6" fill="#fff0ee" stroke="#c43a2a" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="650" y="103" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#c43a2a">语气/情绪/隐性意图</text>
  <text x="650" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#c43a2a">全部在转换中丢失</text>
  <line x1="558" y1="106" x2="570" y2="106" stroke="#c43a2a" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ════ 路径2：文本路径（金色实线） ════ -->
  <!-- 节点1：干净文本 -->
  <rect x="28" y="198" width="140" height="56" rx="8" fill="#fff9f0" stroke="#b5700f" stroke-width="2"/>
  <!-- 小文档图标 -->
  <rect x="44" y="212" width="24" height="30" rx="3" fill="none" stroke="#b5700f" stroke-width="1.5"/>
  <polyline points="56,212 56,220 68,220" stroke="#b5700f" stroke-width="1.5" fill="none"/>
  <line x1="48" y1="226" x2="64" y2="226" stroke="#b5700f" stroke-width="1"/>
  <line x1="48" y1="232" x2="64" y2="232" stroke="#b5700f" stroke-width="1"/>
  <text x="110" y="223" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#b5700f">干净文本</text>
  <text x="110" y="241" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#b5700f" opacity="0.8">结构化 · 无噪声</text>

  <!-- 箭头（实线，直通） -->
  <line x1="168" y1="226" x2="388" y2="226" stroke="#b5700f" stroke-width="2" marker-end="url(#arr-gold)"/>
  <rect x="238" y="200" width="100" height="20" rx="4" fill="#fff9f0"/>
  <text x="288" y="214" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#b5700f">直接对接 · 零损耗</text>

  <!-- 节点2：AI全精度 -->
  <rect x="388" y="198" width="170" height="56" rx="8" fill="#fff9f0" stroke="#b5700f" stroke-width="2"/>
  <!-- 满格信息方块 -->
  <rect x="400" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="414" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="428" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="442" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="456" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="470" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="484" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <rect x="498" y="212" width="10" height="10" rx="2" fill="#b5700f"/>
  <text x="473" y="241" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#b5700f">AI 全精度理解</text>

  <!-- 分割线 -->
  <line x1="28" y1="168" x2="732" y2="168" stroke="#1c1a16" stroke-width="0.5" opacity="0.1"/>

  <!-- 底部对比结论 -->
  <text x="380" y="272" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#7a7670" opacity="0.8">文本是 LLM 的母语——不是绕路，是捷径</text>
</svg>
